name: Vercel Deploy

# All Vercel deploys for this repo run here, not through Vercel's Git integration
# (vercel.json sets git.deploymentEnabled: false). This lets contributors without a
# paid Vercel seat ship: the deploy authenticates as the token owner rather than as
# the commit author. See agent-context/cacc-system-context.md in the .github repo.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: vercel-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # The org's default GITHUB_TOKEN is read-only; commenting the preview URL needs write.
    permissions:
      contents: read
      pull-requests: write
    env:
      VERCEL_ORG_ID: team_IG9FVK124TmJmHtf6sfW0R8h
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      REAL_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      # Without an explicit project id the Vercel CLI does not fail -- it CREATES a
      # new project and deploys there, silently. Fail loudly instead.
      - name: Require VERCEL_PROJECT_ID
        run: |
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error::Repo variable VERCEL_PROJECT_ID is unset. Set it with:"
            echo "::error::  gh variable set VERCEL_PROJECT_ID --repo ${{ github.repository }} --body prj_xxx"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      # Vercel refuses to deploy a commit whose author lacks a paid seat on the team,
      # and enforces this even for token-authenticated CLI deploys. Re-authoring HEAD
      # inside the runner clears the check. This rewrites the commit in the ephemeral
      # checkout only -- the real repository history is never touched or pushed.
      # Side effect: the SHA changes, so the true commit is passed as --meta gitSha.
      - name: Re-author HEAD for Vercel's git-author check
        run: |
          git -c user.name='aroach98' \
              -c user.email='231776248+aroach98@users.noreply.github.com' \
              commit --amend --no-edit --reset-author --allow-empty

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy
        id: deploy
        run: |
          set -euo pipefail
          args="--yes --archive=tgz --token=$VERCEL_TOKEN --meta gitSha=$REAL_SHA"
          if [ "${{ github.event_name }}" = "push" ]; then
            args="$args --prod"
          fi
          url=$(vercel deploy $args)
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed: $url"

      - name: Comment preview URL on the PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const marker = '<!-- vercel-preview -->';
            const body = `${marker}\n**Preview:** ${url}\n\n<sub>Deployed from \`${process.env.REAL_SHA.slice(0,7)}\` by GitHub Actions.</sub>`;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            }
