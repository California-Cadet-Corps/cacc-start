name: Deploy to Production

# Runs ONLY after code is merged (pushed) to main. Builds the app and ships it
# to the Linode server over SSH using an atomic, symlinked-release layout so a
# failed deploy never replaces a working one and rollback is instant.
on:
  push:
    branches: [main]

# Never run two production deploys at once; let an in-flight deploy finish.
concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://start.cacadets.org

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm test

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.LINODE_SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.LINODE_HOST }}
          PORT: ${{ secrets.LINODE_PORT || '22' }}
        run: |
          set -euo pipefail
          retry() {
            local n=0 max=4 delay=5 exit_code=0
            while [ $n -lt $max ]; do
              "$@" && return 0 || exit_code=$?
              n=$((n + 1))
              if [ $n -lt $max ]; then
                echo "Attempt $n/$max failed (exit $exit_code) — retrying in ${delay}s…" >&2
                sleep "$delay"
                delay=$((delay * 2))
              fi
            done
            return $exit_code
          }
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Capture the server's host key; retry on transient connectivity gaps.
          # Do NOT swallow errors after retries: if known_hosts stays empty, every
          # later ssh/rsync would block forever on the interactive host-key prompt.
          keyscan_once() {
            local tmp
            tmp=$(mktemp)
            ssh-keyscan -p "$PORT" -H "$HOST" 2>/dev/null > "$tmp"
            if [ -s "$tmp" ]; then
              cat "$tmp" >> ~/.ssh/known_hosts
              rm -f "$tmp"
              return 0
            fi
            rm -f "$tmp"
            echo "ssh-keyscan returned no host key for $HOST:$PORT" >&2
            return 1
          }
          retry keyscan_once
          if ! grep -q . ~/.ssh/known_hosts; then
            echo "ssh-keyscan captured no host key for $HOST:$PORT — aborting." >&2
            exit 1
          fi

      - name: Upload release to server
        env:
          HOST: ${{ secrets.LINODE_HOST }}
          USER: ${{ secrets.LINODE_USER }}
          PORT: ${{ secrets.LINODE_PORT || '22' }}
          BASE: ${{ secrets.LINODE_DEPLOY_PATH }}
          RELEASE: ${{ github.sha }}
        run: |
          set -euo pipefail
          retry() {
            local n=0 max=4 delay=5 exit_code=0
            while [ $n -lt $max ]; do
              "$@" && return 0 || exit_code=$?
              n=$((n + 1))
              if [ $n -lt $max ]; then
                echo "Attempt $n/$max failed (exit $exit_code) — retrying in ${delay}s…" >&2
                sleep "$delay"
                delay=$((delay * 2))
              fi
            done
            return $exit_code
          }
          # Non-interactive, time-bounded SSH. BatchMode makes a failed auth
          # error out instead of prompting (and hanging) for a password;
          # ConnectTimeout bounds the handshake; ServerAlive* drops a silently
          # dead connection mid-transfer instead of waiting indefinitely.
          # Connection multiplexing: the first ssh opens a master connection and
          # every subsequent ssh/rsync in this deploy reuses that single TCP session
          # (ControlPersist keeps it warm across steps) instead of opening a fresh
          # connection each time. This collapses a deploy's ~5–7 SSH handshakes down
          # to one, which both lightens load on the server's sshd and keeps the run
          # under any connection-rate limit / fail2ban threshold — the root cause of
          # the intermittent "Connection timed out" deploy failures.
          SSH_OPTS="-i $HOME/.ssh/deploy_key -p $PORT \
            -o BatchMode=yes -o ConnectTimeout=15 \
            -o ServerAliveInterval=15 -o ServerAliveCountMax=4 \
            -o StrictHostKeyChecking=accept-new \
            -o ControlMaster=auto -o ControlPath=$HOME/.ssh/cm-%C -o ControlPersist=180"
          retry ssh $SSH_OPTS "$USER@$HOST" \
            "mkdir -p '$BASE/releases/$RELEASE' '$BASE/shared'"
          retry rsync -az --delete \
            -e "ssh $SSH_OPTS" \
            --exclude='.git' --exclude='.github' --exclude='node_modules' \
            --exclude='.env' --exclude='deploy/' \
            ./ "$USER@$HOST:$BASE/releases/$RELEASE/"

      - name: Activate release & restart service
        env:
          HOST: ${{ secrets.LINODE_HOST }}
          USER: ${{ secrets.LINODE_USER }}
          PORT: ${{ secrets.LINODE_PORT || '22' }}
          BASE: ${{ secrets.LINODE_DEPLOY_PATH }}
          RELEASE: ${{ github.sha }}
        run: |
          set -euo pipefail
          retry() {
            local n=0 max=4 delay=5 exit_code=0
            while [ $n -lt $max ]; do
              "$@" && return 0 || exit_code=$?
              n=$((n + 1))
              if [ $n -lt $max ]; then
                echo "Attempt $n/$max failed (exit $exit_code) — retrying in ${delay}s…" >&2
                sleep "$delay"
                delay=$((delay * 2))
              fi
            done
            return $exit_code
          }
          # Connection multiplexing: the first ssh opens a master connection and
          # every subsequent ssh/rsync in this deploy reuses that single TCP session
          # (ControlPersist keeps it warm across steps) instead of opening a fresh
          # connection each time. This collapses a deploy's ~5–7 SSH handshakes down
          # to one, which both lightens load on the server's sshd and keeps the run
          # under any connection-rate limit / fail2ban threshold — the root cause of
          # the intermittent "Connection timed out" deploy failures.
          SSH_OPTS="-i $HOME/.ssh/deploy_key -p $PORT \
            -o BatchMode=yes -o ConnectTimeout=15 \
            -o ServerAliveInterval=15 -o ServerAliveCountMax=4 \
            -o StrictHostKeyChecking=accept-new \
            -o ControlMaster=auto -o ControlPath=$HOME/.ssh/cm-%C -o ControlPersist=180"
          REMOTE_SCRIPT=$(cat <<'REMOTE'
          set -euo pipefail
          RELEASE_DIR="$BASE/releases/$RELEASE"

          # Link shared, non-versioned files (e.g. server .env) into the release.
          ln -sfn "$BASE/shared/.env" "$RELEASE_DIR/.env"

          # Install production dependencies inside the new release.
          cd "$RELEASE_DIR"
          npm ci --omit=dev

          # Atomically flip the "current" symlink to the new release.
          ln -sfn "$RELEASE_DIR" "$BASE/current"

          # Restart the service (sudoers rule allows this exact command, no password).
          sudo systemctl restart cacc-start

          # Keep only the 5 most recent releases.
          cd "$BASE/releases"
          ls -1dt */ | tail -n +6 | xargs -r rm -rf

          echo "Activated release $RELEASE"
          REMOTE
          )
          activate_once() {
            echo "$REMOTE_SCRIPT" | ssh $SSH_OPTS "$USER@$HOST" \
              "RELEASE='$RELEASE' BASE='$BASE' bash -s"
          }
          retry activate_once

      - name: Verify deployment (public health check)
        env:
          # Public production URL — already exposed and non-secret (see README /
          # environment url above). Verifying it exercises the FULL production path
          # (TLS → reverse proxy → Node app), which is what real users hit.
          HEALTH_URL: https://start.cacadets.org/healthz
        run: |
          set -euo pipefail
          # Probe the public endpoint over HTTPS from the runner — no SSH back into
          # the server. The old SSH-based check was the single flakiest step: it
          # opened yet another SSH connection right after the deploy's burst of
          # connections and repeatedly timed out ("Connection timed out") when that
          # connection was dropped, failing the job even though the release was live.
          # An outbound HTTPS probe cannot be affected by SSH throttling and is a
          # strictly better signal.
          for i in $(seq 1 12); do
            code=$(curl -fsS -o /dev/null -w '%{http_code}' --max-time 10 "$HEALTH_URL" || echo "000")
            if [ "$code" = "200" ]; then
              echo "Health check passed: $HEALTH_URL → 200 (attempt $i/12)"
              exit 0
            fi
            echo "Attempt $i/12: $HEALTH_URL → ${code}; retrying in 5s…" >&2
            sleep 5
          done
          echo "Health check FAILED: $HEALTH_URL never returned 200" >&2
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "### ✅ Deployed \`${{ github.sha }}\` to https://start.cacadets.org" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ❌ Deployment failed — production unchanged. See docs/ROLLBACK.md" >> "$GITHUB_STEP_SUMMARY"
          fi
