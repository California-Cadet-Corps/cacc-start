# Apache reverse-proxy vhost for start.cacadets.org
#
# This is the HTTP (port 80) vhost. Install on the server with:
#   sudo cp deploy/apache/start.cacadets.org.conf /etc/apache2/sites-available/
#   sudo a2ensite start.cacadets.org.conf
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# Then obtain SSL + the HTTP->HTTPS redirect with certbot (it generates a
# matching start.cacadets.org-le-ssl.conf automatically):
#   sudo certbot --apache -d start.cacadets.org --redirect
#
# Required Apache modules (already enabled on the production box):
#   proxy, proxy_http, headers, rewrite, ssl
#
# The app is a Node service (systemd unit: cacc-start) listening on 127.0.0.1.
# Its port is defined in $LINODE_DEPLOY_PATH/shared/.env (PORT=3002 in prod,
# because 3000 was already in use by another app on this shared server).

<VirtualHost *:80>
    ServerName start.cacadets.org
    ServerAdmin webmaster@cacadets.org

    ErrorLog ${APACHE_LOG_DIR}/start.cacadets.org.error.log
    CustomLog ${APACHE_LOG_DIR}/start.cacadets.org.access.log combined

    ProxyPreserveHost On
    ProxyRequests Off

    # Reverse-proxy everything to the cacc-start Node app.
    ProxyPass / http://127.0.0.1:3002/
    ProxyPassReverse / http://127.0.0.1:3002/

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Host "start.cacadets.org"
</VirtualHost>

# ---------------------------------------------------------------------------
# After running certbot, the generated start.cacadets.org-le-ssl.conf provides
# the HTTPS (443) vhost. It mirrors the proxy block above plus, for parity with
# the other CACC sites, these security headers are recommended inside it:
#
#   Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
#   Header always set X-Content-Type-Options "nosniff"
#   Header always set X-Frame-Options "SAMEORIGIN"
#   Header always set Referrer-Policy "strict-origin-when-cross-origin"
#   Header always unset X-Powered-By
#   RequestHeader set X-Forwarded-Proto "https"
# ---------------------------------------------------------------------------
