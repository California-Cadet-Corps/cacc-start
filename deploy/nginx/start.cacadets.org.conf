# Nginx site config for start.cacadets.org
# Install to: /etc/nginx/sites-available/start.cacadets.org
# Enable with: ln -s /etc/nginx/sites-available/start.cacadets.org /etc/nginx/sites-enabled/
#
# Run certbot AFTER the HTTP block below is live; certbot will add/manage the
# SSL directives and the HTTP->HTTPS redirect automatically.

server {
    listen 80;
    listen [::]:80;
    server_name start.cacadets.org;

    # Let certbot serve ACME challenges before HTTPS is configured.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name start.cacadets.org;

    # --- Managed by certbot (paths shown for reference) ---
    ssl_certificate     /etc/letsencrypt/live/start.cacadets.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/start.cacadets.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Reverse proxy to the Node app (systemd service cacc-start) ---
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/start.cacadets.org.access.log;
    error_log  /var/log/nginx/start.cacadets.org.error.log;
}
